const ALL = BREAKFASTS.concat(DINNERS);
const mealById = id => ALL.find(m=>m.id===id);
const FISH_DINNERS   = DINNERS.filter(m=>m.fish);
const BEEF_DINNERS   = DINNERS.filter(m=>m.beef);
const PLAIN_DINNERS  = DINNERS.filter(m=>!m.fish && !m.beef);
const QUARK_BREAKFASTS = BREAKFASTS.filter(b=>!b.egg);
const EGG_BREAKFASTS   = BREAKFASTS.filter(b=>b.egg);
const FISH_DAYS_PER_WEEK = 2;   // genau 2 Fischtage
const BEEF_DAYS_PER_WEEK = 1;   // genau 1 Rindfleischtag
const EGG_DAYS_PER_WEEK  = 2;   // ~1/3 der Tage Ei-Frühstück (2:1 zu Quark/Skyr)
const DAY_P=135, DAY_KCAL=1500, DINNER_SHARE=.55;
const WD = ["Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag","Sonntag"];

function solveMeal(meal, targetP, targetKcal){
  let fixedP=0, fixedKcal=0, pKnob=null, cKnob=null; const amounts={};
  for(const [id,g,role] of meal.items){
    if(role==="P") pKnob={id,g}; else if(role==="C") cKnob={id,g};
    else { amounts[id]=(amounts[id]||0)+g; fixedP+=ING[id].p*g/100; fixedKcal+=kcalPer100(id)*g/100; }
  }
  const a1=ING[pKnob.id].p/100,b1=ING[cKnob.id].p/100,a2=kcalPer100(pKnob.id)/100,b2=kcalPer100(cKnob.id)/100;
  const r1=targetP-fixedP,r2=targetKcal-fixedKcal,det=a1*b2-b1*a2;
  let pg=pKnob.g,cg=cKnob.g;
  if(Math.abs(det)>1e-9){pg=(r1*b2-b1*r2)/det;cg=(a1*r2-r1*a2)/det;}
  const clamp=(v,id)=>Math.max(ING[id].kmin||30,Math.min(ING[id].kmax||450,v));
  pg=Math.round(clamp(pg,pKnob.id)/5)*5; cg=Math.round(clamp(cg,cKnob.id)/5)*5;
  amounts[pKnob.id]=(amounts[pKnob.id]||0)+pg; amounts[cKnob.id]=(amounts[cKnob.id]||0)+cg;
  return amounts;
}
function macrosOf(a){let p=0,f=0,c=0;for(const id in a){const g=a[id];p+=ING[id].p*g/100;f+=ING[id].f*g/100;c+=ING[id].c*g/100;}return{p,f,c,kcal:p*4+f*9+c*4};}
function mergeAmt(a,b){const o={...a};for(const k in b)o[k]=(o[k]||0)+b[k];return o;}
// Abendessen wird zuerst auf seinen Anteil gelöst, Frühstück füllt den Rest auf
function buildDay(bM, dM){
  const da=solveMeal(dM, DAY_P*DINNER_SHARE, DAY_KCAL*DINNER_SHARE);
  const am=macrosOf(da);
  const ba=solveMeal(bM, DAY_P-am.p, DAY_KCAL-am.kcal);
  return {b:bM.id, d:dM.id, ba, da, macros:macrosOf(mergeAmt(ba,da))};
}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
// eggFlag: Ei-Frühstück?  dType: "fish" | "beef" | "plain"
function genDay(eggFlag, dType){
  const bpool = eggFlag ? EGG_BREAKFASTS : QUARK_BREAKFASTS;
  const dpool = dType==="fish" ? FISH_DINNERS : dType==="beef" ? BEEF_DINNERS : PLAIN_DINNERS;
  let best=null,bestErr=1e9;
  for(let t=0;t<30;t++){
    const bM=pick(bpool); const dM=pick(dpool);
    const day=buildDay(bM,dM); const m=day.macros;
    if(Math.abs(m.p-DAY_P)<6 && Math.abs(m.kcal-DAY_KCAL)<110 && m.f>=24 && m.f<=34) return day;
    const e=Math.abs(m.f-29)+Math.abs(m.p-DAY_P)*2+Math.abs(m.kcal-DAY_KCAL)/30;
    if(e<bestErr){bestErr=e;best=day;}
  }
  return best;
}
function dayIsFish(day){return !!mealById(day.d).fish;}
function dayIsBeef(day){return !!mealById(day.d).beef;}
function dayIsEgg(day){return !!mealById(day.b).egg;}
function dayType(day){return dayIsFish(day)?"fish":dayIsBeef(day)?"beef":"plain";}
function fishCount(week){return week.filter(dayIsFish).length;}
function beefCount(week){return week.filter(dayIsBeef).length;}
function eggCount(week){return week.filter(dayIsEgg).length;}
function genWeek(){
  // 1 Rindtag, 2 Fischtage, Rest normal; 2 Ei-Frühstücke (nie am Rindtag -> Fett-Budget)
  const all=[0,1,2,3,4,5,6];
  const beefDay=Math.floor(Math.random()*7);
  const rest=all.filter(i=>i!==beefDay);
  for(let i=rest.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[rest[i],rest[j]]=[rest[j],rest[i]];}
  const fishSet=new Set(rest.slice(0,FISH_DAYS_PER_WEEK));
  const nonBeef=all.filter(i=>i!==beefDay);
  for(let i=nonBeef.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[nonBeef[i],nonBeef[j]]=[nonBeef[j],nonBeef[i]];}
  const eggSet=new Set(nonBeef.slice(0,EGG_DAYS_PER_WEEK));
  const week=[];
  for(let i=0;i<7;i++){
    const dType = i===beefDay ? "beef" : fishSet.has(i) ? "fish" : "plain";
    week.push(genDay(eggSet.has(i), dType));
  }
  return week;
}

let state = load() || {week:genWeek(), days:[0,1,2,3,4,5,6], checks:{}};
if(!Array.isArray(state.week) || state.week.length!==7 ||
   state.week.some(x=>!x||!mealById(x.b)||!mealById(x.d)) ||
   fishCount(state.week)!==FISH_DAYS_PER_WEEK || beefCount(state.week)!==BEEF_DAYS_PER_WEEK || eggCount(state.week)!==EGG_DAYS_PER_WEEK){
  state.week=genWeek(); state.checks={};
}
function load(){try{const s=localStorage.getItem("mahlzeit_green_v2");return s?JSON.parse(s):null;}catch(e){return null;}}
function save(){try{localStorage.setItem("mahlzeit_green_v2",JSON.stringify(state));}catch(e){}}
save(); // beim ersten Laden sofort sichern -> Plan bleibt beim Neuladen gleich

function ingLine(amounts){
  return Object.keys(amounts).map(id=>{
    const g=Math.round(amounts[id]);
    let amt = ING[id].piece ? Math.max(1,Math.round(g/ING[id].piece))+"×" : g+" g";
    return `${ING[id].n} <span class="amt">${amt}</span>`;
  }).join(" · ");
}
function macroCard(label,val,unit,target,over){
  const pct=Math.min(100,Math.round(val/target*100));
  return `<div class="macro ${over?'over':''}"><div class="v">${Math.round(val)}<small>${unit}</small></div>
    <div class="l">${label}</div><div class="bar"><i style="width:${pct}%"></i></div></div>`;
}
function fishBadge(meal){if(!meal||!meal.fish)return "";return `<span class="fishbadge">${meal.fish==="omega"?"Omega-3":"Garnelen"}</span>`;}
function mealRow(i,key,kind,icon,cls,name,amounts,badge){
  return `<div class="meal ${cls}" data-day="${i}" data-key="${key}">
    <div class="mtag">${icon}</div>
    <div class="mbody"><div class="mkind">${kind}</div><div class="mname">${name} ${badge}</div>
      <div class="ings">${ingLine(amounts)}</div></div>
    <div class="mactions">
      <button class="meal-reroll" data-day="${i}" data-key="${key}" title="Nur diese Mahlzeit neu würfeln">↻</button>
      <span class="chev">›</span>
    </div></div>`;
}
// Nur eine Mahlzeit neu würfeln; Tagestyp (Ei/Quark, Fisch/Rind/sonst) bleibt erhalten,
// Tagesmakros werden neu austariert. key: "ba" (Frühstück) oder "da" (Abendessen).
function rerollMeal(i,key){
  const day=state.week[i];
  const curB=mealById(day.b), curD=mealById(day.d);
  const bPool=(dayIsEgg(day)?EGG_BREAKFASTS:QUARK_BREAKFASTS).filter(x=>x.id!==day.b);
  const dPool=(dayType(day)==="fish"?FISH_DINNERS:dayType(day)==="beef"?BEEF_DINNERS:PLAIN_DINNERS).filter(x=>x.id!==day.d);
  let best=null,bestErr=1e9;
  for(let t=0;t<40;t++){
    const nb = key==="ba" ? (bPool.length?pick(bPool):curB) : curB;
    const nd = key==="da" ? (dPool.length?pick(dPool):curD) : curD;
    const nday=buildDay(nb,nd); const m=nday.macros;
    if(Math.abs(m.p-DAY_P)<6 && Math.abs(m.kcal-DAY_KCAL)<110 && m.f>=24 && m.f<=34){best=nday;break;}
    const e=Math.abs(m.f-29)+Math.abs(m.p-DAY_P)*2+Math.abs(m.kcal-DAY_KCAL)/30;
    if(e<bestErr){bestErr=e;best=nday;}
  }
  if(best){state.week[i]=best;state.checks={};save();renderPlan();renderMeta();renderShop();updateBadge();}
}
function renderPlan(){
  const list=document.getElementById("planList");
  list.innerHTML = state.week.map((day,i)=>{
    const b=mealById(day.b), d=mealById(day.d), m=day.macros;
    return `<div class="day">
      <div class="day-head"><div class="dl"><span class="dname">${WD[i]}</span><span class="ddate">Tag ${i+1}</span></div>
        <button class="reroll" data-day="${i}" title="Ganzen Tag neu würfeln">↻</button></div>
      ${mealRow(i,"ba","Frühstück","🌅","breakfast",b.n,day.ba,"")}
      ${mealRow(i,"da","Abendessen","🌙","dinner",d.n,day.da,fishBadge(d))}
      <div class="macros">
        ${macroCard("Protein",m.p,"g",135,false)}
        ${macroCard("Fett",m.f,"g",30,m.f>34)}
        ${macroCard("Kohlenh.",m.c,"g",175,false)}
        <div class="macro kcal"><div class="v">${Math.round(m.kcal)}<small>kcal</small></div>
          <div class="l">Energie</div><div class="bar"><i style="width:${Math.min(100,Math.round(m.kcal/1500*100))}%"></i></div></div>
      </div></div>`;
  }).join("");
  list.querySelectorAll(".reroll").forEach(btn=>{btn.onclick=(e)=>{e.stopPropagation();const i=+btn.dataset.day;
    state.week[i]=genDay(dayIsEgg(state.week[i]), dayType(state.week[i]));state.checks={};save();renderPlan();renderMeta();renderShop();updateBadge();};});
  list.querySelectorAll(".meal-reroll").forEach(btn=>{btn.onclick=(e)=>{e.stopPropagation();rerollMeal(+btn.dataset.day, btn.dataset.key);};});
  list.querySelectorAll(".meal").forEach(el=>{el.onclick=()=>{const day=state.week[+el.dataset.day],key=el.dataset.key;
    const amounts=day[key];const kind=key==="ba"?"Frühstück":"Abendessen";const meal=key==="ba"?mealById(day.b):mealById(day.d);
    openMeal(kind,meal,amounts);};});
}
function renderMeta(){
  const fc=fishCount(state.week);const tot=state.week.reduce((a,x)=>a+x.macros.kcal,0)/7;
  document.getElementById("weekMeta").innerHTML=
    `<span class="pill">🐟 <b>${fc}</b> Fischtage</span><span class="pill">🎯 <b>135</b> g Protein</span><span class="pill">Ø <b>${Math.round(tot)}</b> kcal</span>`;
}
function openMeal(kind, meal, amounts){
  const m=macrosOf(amounts);
  document.getElementById("mModalKind").textContent=kind;
  document.getElementById("mModalName").innerHTML=(meal.n||"")+" "+fishBadge(meal);
  document.getElementById("mModalMacros").innerHTML=`
    <div class="m"><div class="v">${Math.round(m.p)}<small>g</small></div><div class="l">Protein</div></div>
    <div class="m"><div class="v">${Math.round(m.f)}<small>g</small></div><div class="l">Fett</div></div>
    <div class="m"><div class="v">${Math.round(m.c)}<small>g</small></div><div class="l">Kohlenh.</div></div>
    <div class="m kcal"><div class="v">${Math.round(m.kcal)}<small>kcal</small></div><div class="l">Energie</div></div>`;
  document.getElementById("mModalIngs").innerHTML=Object.keys(amounts).map(id=>{
    const g=Math.round(amounts[id]);const amt=ING[id].piece?Math.max(1,Math.round(g/ING[id].piece))+" Stück":g+" g";
    return `<li><span>${ING[id].n}</span><b>${amt}</b></li>`;}).join("");
  document.getElementById("overlay").classList.add("on");
}
function closeMeal(){document.getElementById("overlay").classList.remove("on");}
document.getElementById("mModalClose").onclick=closeMeal;
document.getElementById("overlay").onclick=(e)=>{if(e.target.id==="overlay")closeMeal();};
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeMeal();});

function aggregate(){const agg={};state.days.forEach(i=>{const day=state.week[i];[day.ba,day.da].forEach(am=>{for(const id in am){agg[id]=(agg[id]||0)+am[id];}});});return agg;}
function fmtAmount(id,g){if(ING[id].piece){return Math.max(1,Math.round(g/ING[id].piece))+" Stück";}if(g>=1000)return (g/1000).toFixed(1).replace(".0","")+" kg";return Math.round(g)+" g";}
function fmtPack(id,g){const ing=ING[id];if(ing.pantry)return "Vorrat";if(ing.pack){const packs=Math.ceil(g/ing.pack);const lbl=ing.pack>=1000?(ing.pack/1000)+" l":ing.pack+" g";return "≈ "+packs+"× "+lbl;}return "";}
function renderChips(){const wrap=document.getElementById("dayChips");
  wrap.innerHTML=WD.map((w,i)=>`<button class="chip ${state.days.includes(i)?'on':''}" data-i="${i}">${w.slice(0,2)}</button>`).join("");
  wrap.querySelectorAll(".chip").forEach(c=>{c.onclick=()=>{const i=+c.dataset.i;
    if(state.days.includes(i))state.days=state.days.filter(x=>x!==i);else{state.days.push(i);state.days.sort((a,b)=>a-b);}
    save();renderChips();renderShop();updateBadge();};});
}
function renderShop(){
  const agg=aggregate();const cont=document.getElementById("shopList");
  if(!Object.keys(agg).length){cont.innerHTML=`<div class="empty">Keine Tage ausgewählt.<br>Wähle oben mindestens einen Tag.</div>`;return;}
  let html="";
  CAT_ORDER.forEach(cat=>{
    const ids=Object.keys(agg).filter(id=>ING[id].cat===cat).sort((a,b)=>(state.checks[a]?1:0)-(state.checks[b]?1:0)||ING[a].n.localeCompare(ING[b].n));
    if(!ids.length)return;
    html+=`<div class="cat"><h3><span class="ci">${CATS[cat].i}</span><span>${CATS[cat].n}</span><span class="cn">${ids.length} Artikel</span></h3><div class="list">`;
    ids.forEach(id=>{const done=!!state.checks[id];const pack=fmtPack(id,agg[id]);
      html+=`<div class="item ${done?'done':''}" data-id="${id}"><div class="cbox"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div>
        <div class="iname">${ING[id].n}</div><div class="iamt">${fmtAmount(id,agg[id])}${pack?`<span class="ipack">${pack}</span>`:""}</div></div>`;});
    html+=`</div></div>`;
  });
  cont.innerHTML=html;
  cont.querySelectorAll(".item").forEach(it=>{it.onclick=()=>{const id=it.dataset.id;if(state.checks[id])delete state.checks[id];else state.checks[id]=1;save();renderShop();updateBadge();};});
}
function updateBadge(){const agg=aggregate();const open=Object.keys(agg).filter(id=>!state.checks[id]).length;const b=document.getElementById("shopBadge");if(open>0){b.style.display="";b.textContent=open;}else b.style.display="none";}

document.querySelectorAll(".tab").forEach(t=>{t.onclick=()=>{document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));t.classList.add("on");
  const v=t.dataset.view;document.getElementById("viewPlan").classList.toggle("on",v==="Plan");document.getElementById("viewShop").classList.toggle("on",v==="Shop");
  document.getElementById("regenBtn").style.visibility=v==="Plan"?"visible":"hidden";window.scrollTo({top:0,behavior:"smooth"});};});
document.getElementById("regenBtn").onclick=()=>{state.week=genWeek();state.checks={};save();renderPlan();renderMeta();renderShop();updateBadge();window.scrollTo({top:0,behavior:"smooth"});};
document.getElementById("toggleAll").onclick=()=>{state.days=state.days.length===7?[]:[0,1,2,3,4,5,6];save();renderChips();renderShop();updateBadge();};

renderPlan(); renderMeta(); renderChips(); renderShop(); updateBadge();

if("serviceWorker" in navigator){
  const sw=`self.addEventListener("install",e=>self.skipWaiting());
  self.addEventListener("activate",e=>e.waitUntil(self.clients.claim()));
  self.addEventListener("fetch",e=>{e.respondWith(caches.open("mahlzeit").then(c=>c.match(e.request).then(r=>r||fetch(e.request).then(res=>{if(e.request.method==="GET")c.put(e.request,res.clone());return res;}).catch(()=>caches.match("./")))));});`;
  try{const url=URL.createObjectURL(new Blob([sw],{type:"text/javascript"}));navigator.serviceWorker.register(url).catch(()=>{});}catch(e){}
}
</script>
</body>
</html>
