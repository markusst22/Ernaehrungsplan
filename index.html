<style>

    --bg:#eef6ec; --bg2:#f6fbf4; --card:#ffffff; --ink:#2b372b; --ink-soft:#5d6b5a;

  .brand h1{font-family:Georgia,"Times New Roman",serif;font-weight:600;font-size:26px;margin:0;letter-spacing:-.01em}
  .iconbtn{
    border:1px solid var(--line);background:var(--card);color:var(--ink);
    border-radius:14px;padding:9px 13px;font-size:14px;font-weight:600;cursor:pointer;
    box-shadow:var(--shadow);display:inline-flex;align-items:center;gap:7px;transition:transform .12s ease,background .15s;
  }
  .iconbtn:active{transform:scale(.96)}
  .iconbtn.primary{background:var(--green);border-color:var(--green-d);color:#fff}

  /* day summary */
  .week-meta{display:flex;align-items:center;gap:10px;margin:0 2px 14px;flex-wrap:wrap}
  .pill{font-size:12px;color:var(--ink-soft);background:var(--bg2);border:1px solid var(--line);
    padding:5px 11px;border-radius:999px;font-weight:600}
  .pill b{color:var(--accent)}

  .day{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
    box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden;animation:rise .4s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .day-head{display:flex;align-items:center;justify-content:space-between;
    padding:13px 16px 11px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#fbfdfa,#fff)}
  .day-head .dl{display:flex;align-items:baseline;gap:9px}
  .day-head .dname{font-weight:700;font-size:15px;letter-spacing:.01em}
  .day-head .ddate{font-size:12px;color:var(--ink-soft)}
  .reroll{border:none;background:var(--green-soft);color:var(--green-d);width:32px;height:32px;
    border-radius:10px;font-size:15px;cursor:pointer;display:grid;place-items:center;transition:transform .25s,background .15s}
  .reroll:active{transform:rotate(180deg) scale(.9);background:var(--mint)}
  .meal{padding:12px 16px;display:flex;gap:12px;align-items:flex-start}
  .meal + .meal{border-top:1px dashed var(--line)}
  .mtag{flex:0 0 auto;width:34px;height:34px;border-radius:11px;display:grid;place-items:center;font-size:17px;
    background:var(--green-soft)}
  .meal.dinner .mtag{background:#f1ecdf}
  .mbody{flex:1;min-width:0}
  .mkind{font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-soft);font-weight:700}
  .mname{font-weight:650;font-size:14.5px;margin:1px 0 4px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .fishbadge{font-size:10px;font-weight:700;letter-spacing:.04em;color:var(--fish);
    background:var(--fish-bg);border-radius:7px;padding:2px 7px;text-transform:uppercase}
  .ings{font-size:12.5px;color:var(--ink-soft);line-height:1.5}

  .macros{display:flex;gap:7px;padding:11px 16px 14px;flex-wrap:wrap;background:var(--bg2);border-top:1px solid var(--line)}
  .macro{flex:1 1 0;min-width:62px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:7px 9px;text-align:center}
  .macro .v{font-weight:700;font-size:15px;line-height:1.1}
  .macro .v small{font-size:10px;font-weight:600;color:var(--ink-soft)}
  .macro .l{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);margin-top:2px;font-weight:600}
  .macro.kcal .v{color:var(--accent)}
  .macro .bar{height:3px;border-radius:3px;background:var(--line);margin-top:6px;overflow:hidden}
  .macro .bar i{display:block;height:100%;background:var(--green);border-radius:3px}

  .item{display:flex;align-items:center;gap:12px;padding:12px 15px;cursor:pointer;transition:background .12s}

  .cbox svg{width:13px;height:13px;opacity:0;transform:scale(.5);transition:.15s}
  .item.done .cbox{background:var(--green);border-color:var(--green)}
  .item.done .cbox svg{opacity:1;transform:scale(1)}
  .iname{flex:1;font-size:14.5px;font-weight:550}
  .iamt{font-size:13px;font-weight:700;color:var(--accent);text-align:right}
  .ipack{display:block;font-size:10.5px;font-weight:600;color:var(--ink-soft)}
  .item.done .iname,.item.done .iamt{color:var(--ink-soft);text-decoration:line-through;text-decoration-color:var(--mint)}
  .empty{text-align:center;color:var(--ink-soft);font-size:14px;padding:40px 20px}

  .hint{font-size:11.5px;color:var(--ink-soft);text-align:center;margin:4px 6px 0;line-height:1.5}

  /* bottom tab bar */
  .tabbar{position:fixed;left:0;right:0;bottom:0;z-index:30;
    padding:8px 16px calc(8px + env(safe-area-inset-bottom));
    background:linear-gradient(180deg,rgba(238,246,236,0),var(--bg) 38%);}
  .tabbar .inner{max-width:560px;margin:0 auto;background:var(--card);border:1px solid var(--line);
    border-radius:20px;box-shadow:var(--shadow);display:flex;padding:6px;gap:6px}
  .tab{flex:1;border:none;background:none;border-radius:15px;padding:9px 6px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--ink-soft);font-weight:650;font-size:11.5px;transition:.15s}
  .tab .ti{font-size:19px;line-height:1}
  .tab.on{background:var(--green-soft);color:var(--green-d)}
  .tab .badge{font-size:10px;background:var(--green);color:#fff;border-radius:999px;padding:0 6px;min-width:16px;line-height:16px}

  .view{display:none}
  .view.on{display:block}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand">
      <span class="kicker">Wochenküche</span>
      <h1>Mahlzeit</h1>
    </div>
    <button class="iconbtn primary" id="regenBtn">🎲 Neu</button>
  </header>

  <!-- WOCHENPLAN -->
  <section class="view on" id="viewPlan">
    <div class="week-meta" id="weekMeta"></div>
    <div id="planList"></div>
    <p class="hint">Ziel pro Tag: <b>135 g Protein · 30 g Fett · 1500 kcal</b>.<br>
      Mengen werden automatisch berechnet, damit die Makros möglichst genau getroffen werden. Kein Brot · mind. 2 Omega-3-Fischtage.</p>
  </section>

  <!-- EINKAUFSLISTE -->

<script>

/* ---------- Lebensmittel-Datenbank (Werte je 100 g, REWE-üblich) ---------- */
const ING = {

  harzer:{n:"Harzer Käse",cat:"milch",p:30,f:.7,c:0,pack:200,kmin:80,kmax:220},

  // Fisch & Meeresfrüchte

  makrele:{n:"Makrelenfilet",cat:"fisch",p:20,f:16,c:0,pack:200},

  zwiebel:{n:"Zwiebel",cat:"gemuese",p:1.1,f:.1,c:9,piece:100},
  spinat:{n:"Blattspinat (TK)",cat:"gemuese",p:3,f:.4,c:1.5,pack:450},
  erbsen:{n:"Erbsen (TK)",cat:"gemuese",p:5,f:.4,c:12,pack:450},
  gemuesemix:{n:"Gemüsepfanne (TK)",cat:"gemuese",p:2,f:.5,c:6,pack:450},
  kartoffel:{n:"Kartoffeln",cat:"gemuese",p:2,f:.1,c:15,pack:1000,kmin:150,kmax:450},
  // Trockenwaren & Vorrat
  haferflocken:{n:"Haferflocken",cat:"vorrat",p:13,f:7,c:59,pack:500,kmin:30,kmax:130},
  reis:{n:"Reis",cat:"vorrat",p:7,f:.6,c:78,pack:500,kmin:40,kmax:120},
  nudeln:{n:"Vollkornnudeln",cat:"vorrat",p:13,f:2.5,c:62,pack:500,kmin:40,kmax:120},
  quinoa:{n:"Quinoa",cat:"vorrat",p:14,f:6,c:58,pack:500,kmin:40,kmax:110},
  tomaten:{n:"Passierte Tomaten",cat:"vorrat",p:1.4,f:.2,c:5,pack:500},
  whey:{n:"Whey-Proteinpulver",cat:"vorrat",p:80,f:6,c:6,pantry:true},
  leinsamen:{n:"Leinsamen, geschrotet",cat:"vorrat",p:25,f:33,c:5,pantry:true},
  tofu:{n:"Tofu natur",cat:"vorrat",p:12,f:7,c:1.5,pack:200},
  olivenoel:{n:"Olivenöl",cat:"vorrat",p:0,f:100,c:0,pantry:true},
};
const CATS = {
  milch:{n:"Milchprodukte & Eier",i:"🥛"},
  fisch:{n:"Fisch & Meeresfrüchte",i:"🐟"},
  fleisch:{n:"Fleisch",i:"🍗"},
  gemuese:{n:"Obst & Gemüse",i:"🥦"},
  vorrat:{n:"Trockenwaren & Vorrat",i:"🫙"},
};
const CAT_ORDER = ["milch","fisch","fleisch","gemuese","vorrat"];

const kcalPer100 = id => ING[id].p*4 + ING[id].f*9 + ING[id].c*4;

/* ---------- Gerichte: role P = Protein-Stellschraube, C = Carb-Stellschraube ---------- */
// items: [id, gramm, role]   role: "P","C" oder "" (fix)
const BREAKFASTS = [
  {id:"b1",n:"Protein-Overnight-Oats",items:[["magerquark",250,"P"],["haferflocken",60,"C"],["beeren",100,""],["whey",15,""]]},
  {id:"b2",n:"Skyr-Beeren-Bowl",items:[["skyr",300,"P"],["haferflocken",50,"C"],["banane",100,""],["leinsamen",10,""]]},
  {id:"b3",n:"Rührei mit Quark & Paprika",items:[["ei",110,""],["magerquark",180,"P"],["paprika",120,""],["haferflocken",40,"C"]]},
  {id:"b4",n:"Quark-Apfel-Porridge",items:[["magerquark",250,"P"],["haferflocken",60,"C"],["apfel",150,""],["whey",15,""]]},
  {id:"b5",n:"Hüttenkäse-Bowl",items:[["huettenkaese",200,""],["skyr",150,"P"],["haferflocken",50,"C"],["beeren",100,""]]},
  {id:"b6",n:"Harzer-Rührei mit Kartoffeln",items:[["harzer",120,"P"],["ei",55,""],["kartoffel",200,"C"],["paprika",100,""]]},
];
const DINNERS = [
  {id:"d1",n:"Hähnchen-Reispfanne",items:[["haehnchen",200,"P"],["reis",75,"C"],["brokkoli",200,""],["paprika",100,""],["olivenoel",5,""]]},
  {id:"d2",n:"Lachs, Kartoffeln, Brokkoli & Quark-Dip",fish:"omega",items:[["lachs",110,""],["kartoffel",250,"C"],["brokkoli",200,""],["magerquark",200,"P"]]},
  {id:"d3",n:"Makrele mit Ofenkartoffeln & Skyr-Dip",fish:"omega",items:[["makrele",90,""],["kartoffel",250,"C"],["zucchini",250,""],["skyr",200,"P"]]},
  {id:"d4",n:"Garnelen-Gemüse-Reispfanne",fish:"see",items:[["garnelen",200,"P"],["reis",70,"C"],["zucchini",200,""],["paprika",100,""],["olivenoel",5,""]]},
  {id:"d5",n:"Seelachs mit Kartoffeln & Erbsen",fish:"see",items:[["seelachs",220,"P"],["kartoffel",300,"C"],["erbsen",150,""]]},
  {id:"d6",n:"Forelle mit Reis & Gemüse",fish:"omega",items:[["forelle",150,""],["reis",70,"C"],["gemuesemix",250,""],["magerquark",150,"P"]]},
  {id:"d7",n:"Putenbrust mit Nudeln & Tomatensauce",items:[["pute",200,"P"],["nudeln",75,"C"],["tomaten",200,""],["zwiebel",50,""],["olivenoel",5,""]]},
  {id:"d8",n:"Hähnchen-Quinoa-Bowl",items:[["haehnchen",200,"P"],["quinoa",60,"C"],["spinat",150,""],["tomaten",100,""]]},
  {id:"d9",n:"Tofu-Gemüse-Wok mit Reis",veg:true,items:[["tofu",150,""],["magerquark",200,"P"],["reis",60,"C"],["gemuesemix",300,""]]},
  {id:"d10",n:"Thunfisch-Reissalat",fish:"see",items:[["thunfisch",150,"P"],["reis",70,"C"],["paprika",120,""],["gurke",100,""],["zwiebel",40,""]]},
  {id:"d11",n:"Harzer mit Bratkartoffeln & Gemüse",veg:true,items:[["harzer",180,"P"],["kartoffel",300,"C"],["zucchini",150,""],["paprika",100,""],["olivenoel",5,""]]},
];

const DAY_P=135, DAY_KCAL=1500;
const DINNER_P_SHARE=.55, DINNER_KCAL_SHARE=.56;
const WD = ["Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag","Sonntag"];

/* ---------- Solver: skaliert P- & C-Knopf eines Gerichts auf Teilziele ---------- */
function solveMeal(meal, targetP, targetKcal){
  let fixedP=0, fixedKcal=0, pKnob=null, cKnob=null;
  const amounts={};
  for(const [id,g,role] of meal.items){
    if(role==="P") pKnob={id,g};
    else if(role==="C") cKnob={id,g};
    else { amounts[id]=(amounts[id]||0)+g; fixedP+=ING[id].p*g/100; fixedKcal+=kcalPer100(id)*g/100; }
  }
  // Koeffizienten je Gramm
  const a1=ING[pKnob.id].p/100, b1=ING[cKnob.id].p/100;
  const a2=kcalPer100(pKnob.id)/100, b2=kcalPer100(cKnob.id)/100;
  const r1=targetP-fixedP, r2=targetKcal-fixedKcal;
  const det=a1*b2-b1*a2;
  let pg=pKnob.g, cg=cKnob.g;
  if(Math.abs(det)>1e-9){
    pg=(r1*b2-b1*r2)/det;
    cg=(a1*r2-r1*a2)/det;
  }
  const clamp=(v,id)=>Math.max(ING[id].kmin||30,Math.min(ING[id].kmax||450,v));
  pg=Math.round(clamp(pg,pKnob.id)/5)*5;
  cg=Math.round(clamp(cg,cKnob.id)/5)*5;
  amounts[pKnob.id]=(amounts[pKnob.id]||0)+pg;
  amounts[cKnob.id]=(amounts[cKnob.id]||0)+cg;
  return amounts;
}
function macrosOf(amounts){
  let p=0,f=0,c=0;
  for(const id in amounts){const g=amounts[id];p+=ING[id].p*g/100;f+=ING[id].f*g/100;c+=ING[id].c*g/100;}
  return {p,f,c,kcal:p*4+f*9+c*4};
}
function buildDay(b,d){
  const ba=solveMeal(b, DAY_P*(1-DINNER_P_SHARE), DAY_KCAL*(1-DINNER_KCAL_SHARE));
  const da=solveMeal(d, DAY_P*DINNER_P_SHARE, DAY_KCAL*DINNER_KCAL_SHARE);
  const m=macrosOf({...mergeAmt(ba,da)});
  return {b:b.id,d:d.id,ba,da,macros:m};
}
function mergeAmt(a,b){const o={...a};for(const k in b)o[k]=(o[k]||0)+b[k];return o;}

/* ---------- Tageserzeugung mit Fett-Korridor ---------- */
const FISH_DAYS_PER_WEEK = 2;          // genau so viele Fischtage
const OMEGA_DINNERS = DINNERS.filter(d=>d.fish==="omega");   // Lachs/Makrele/Forelle
const NOFISH_DINNERS = DINNERS.filter(d=>!d.fish);           // garantiert ohne Fisch

function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
// mode: "fish" -> Omega-3-Fischgericht, "nofish" -> garantiert fischfrei
function genDay(mode){
  const pool = mode==="fish" ? OMEGA_DINNERS : NOFISH_DINNERS;
  let best=null,bestErr=1e9;
  for(let t=0;t<60;t++){
    const b=pick(BREAKFASTS);
    const d=pick(pool);
    const day=buildDay(b,d);
    const fat=day.macros.f;
    const err=Math.abs(fat-30) + Math.abs(day.macros.p-DAY_P)*1.5 + Math.abs(day.macros.kcal-DAY_KCAL)/40;
    if(fat>=24 && fat<=33 && Math.abs(day.macros.p-DAY_P)<8 && Math.abs(day.macros.kcal-DAY_KCAL)<=100){ return day; }
    if(err<bestErr){bestErr=err;best=day;}
  }
  return best;
}
function fishCount(week){return week.filter(x=>!!DINNERS.find(d=>d.id===x.d).fish).length;}
function isFishDay(day){return !!DINNERS.find(d=>d.id===day.d).fish;}
function genWeek(){
  // genau FISH_DAYS_PER_WEEK zufällige Tage als Fischtage festlegen
  const idx=[0,1,2,3,4,5,6];
  for(let i=idx.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]];}
  const fishSet=new Set(idx.slice(0,FISH_DAYS_PER_WEEK));
  const week=[];
  for(let i=0;i<7;i++) week.push(genDay(fishSet.has(i)?"fish":"nofish"));
  return week;
}

/* ---------- State + Persistenz ---------- */
let state = load() || {week:genWeek(), days:[0,1,2,3,4,5,6], checks:{}};
// Migration/Sicherung: alte Pläne ggf. auf "genau 2 Fischtage" bringen
if(!Array.isArray(state.week) || state.week.length!==7 ||
   state.week.some(x=>!x||!DINNERS.find(d=>d.id===x.d)) ||
   fishCount(state.week)!==FISH_DAYS_PER_WEEK){
  state.week=genWeek(); state.checks={};
}
function load(){try{const s=localStorage.getItem("mahlzeit_v1");return s?JSON.parse(s):null;}catch(e){return null;}}
function save(){try{localStorage.setItem("mahlzeit_v1",JSON.stringify(state));}catch(e){}}

/* ---------- Rendering: Wochenplan ---------- */
function ingLine(amounts){
  return Object.keys(amounts).map(id=>{
    const g=Math.round(amounts[id]);
    let amt;
    if(ING[id].piece){const pc=Math.max(1,Math.round(g/ING[id].piece));amt=pc+"×";}
    else amt=g+" g";
    return `${ING[id].n} <span class="amt">${amt}</span>`;
  }).join(" · ");
}
function macroCard(label,val,unit,target,over){
  const pct=Math.min(100,Math.round(val/target*100));
  return `<div class="macro ${over?'over':''}">
    <div class="v">${Math.round(val)}<small>${unit}</small></div>
    <div class="l">${label}</div>
    <div class="bar"><i style="width:${pct}%"></i></div></div>`;
}
function renderPlan(){
  const list=document.getElementById("planList");
  const week=state.week;
  list.innerHTML = week.map((day,i)=>{
    const b=BREAKFASTS.find(x=>x.id===day.b), d=DINNERS.find(x=>x.id===day.d);
    const m=day.macros;
    const fishBadge = d.fish ? `<span class="fishbadge">${d.fish==="omega"?"Omega-3":"Fisch"}</span>` : "";
    return `<div class="day">
      <div class="day-head">
        <div class="dl"><span class="dname">${WD[i]}</span><span class="ddate">Tag ${i+1}</span></div>
        <button class="reroll" data-day="${i}" title="Tag neu würfeln">↻</button>
      </div>
      <div class="meal breakfast">
        <div class="mtag">🌅</div>
        <div class="mbody"><div class="mkind">Frühstück</div>
          <div class="mname">${b.n}</div>
          <div class="ings">${ingLine(day.ba)}</div></div>
      </div>
      <div class="meal dinner">
        <div class="mtag">🌙</div>
        <div class="mbody"><div class="mkind">Abendessen</div>
          <div class="mname">${d.n} ${fishBadge}</div>
          <div class="ings">${ingLine(day.da)}</div></div>
      </div>
      <div class="macros">
        ${macroCard("Protein",m.p,"g",135,false)}
        ${macroCard("Fett",m.f,"g",30,m.f>33)}
        ${macroCard("Kohlenh.",m.c,"g",175,false)}
        <div class="macro kcal"><div class="v">${Math.round(m.kcal)}<small>kcal</small></div>
          <div class="l">Energie</div><div class="bar"><i style="width:${Math.min(100,Math.round(m.kcal/1500*100))}%"></i></div></div>
      </div>
    </div>`;
  }).join("");
  list.querySelectorAll(".reroll").forEach(btn=>{
    btn.onclick=()=>{
      const i=+btn.dataset.day;
      // Fischtag bleibt Fischtag, fischfreier Tag bleibt fischfrei -> genau 2 Fischtage
      state.week[i]=genDay(isFishDay(state.week[i]) ? "fish" : "nofish");
      state.checks={}; // Mengen ändern sich → Liste zurücksetzen
      save(); renderPlan(); renderMeta(); renderShop(); updateBadge();
    };
  });
}
function renderMeta(){
  const fc=fishCount(state.week);
  const tot=state.week.reduce((a,x)=>a+x.macros.kcal,0)/7;
  document.getElementById("weekMeta").innerHTML=
    `<span class="pill">🐟 <b>${fc}</b> Fischtage (Omega-3)</span>
     <span class="pill">Ø <b>${Math.round(tot)}</b> kcal/Tag</span>
     <span class="pill">🍞 brotfrei</span>`;
}

/* ---------- Rendering: Einkaufsliste ---------- */
function aggregate(){
  const agg={};
  state.days.forEach(i=>{
    const day=state.week[i];
    [day.ba,day.da].forEach(am=>{for(const id in am){agg[id]=(agg[id]||0)+am[id];}});
  });
  return agg;
}
function fmtAmount(id,g){
  if(ING[id].piece){const pc=Math.max(1,Math.round(g/ING[id].piece));return pc+" Stück";}
  if(g>=1000) return (g/1000).toFixed(1).replace(".0","")+" kg";
  return Math.round(g)+" g";
}
function fmtPack(id,g){
  const ing=ING[id];
  if(ing.pantry) return "Vorrat";
  if(ing.piece && ing.packPc){const pc=Math.ceil(g/ing.piece);const packs=Math.ceil(pc/ing.packPc);return "≈ "+packs+"× "+ing.packPc+"er";}
  if(ing.pack){const packs=Math.ceil(g/ing.pack);const lbl=ing.pack>=1000?(ing.pack/1000)+" kg":ing.pack+" g";return "≈ "+packs+"× "+lbl;}
  return "";
}
function renderChips(){
  const wrap=document.getElementById("dayChips");
  wrap.innerHTML=WD.map((w,i)=>`<button class="chip ${state.days.includes(i)?'on':''}" data-i="${i}">${w.slice(0,2)}</button>`).join("");
  wrap.querySelectorAll(".chip").forEach(c=>{
    c.onclick=()=>{
      const i=+c.dataset.i;
      if(state.days.includes(i)) state.days=state.days.filter(x=>x!==i);
      else { state.days.push(i); state.days.sort((a,b)=>a-b); }
      save(); renderChips(); renderShop(); updateBadge();
    };
  });
}
function renderShop(){
  const agg=aggregate();
  const cont=document.getElementById("shopList");
  if(!Object.keys(agg).length){cont.innerHTML=`<div class="empty">Keine Tage ausgewählt.<br>Wähle oben mindestens einen Tag.</div>`;return;}
  let html="";
  CAT_ORDER.forEach(cat=>{
    const ids=Object.keys(agg).filter(id=>ING[id].cat===cat)
      .sort((a,b)=>(state.checks[a]?1:0)-(state.checks[b]?1:0) || ING[a].n.localeCompare(ING[b].n));
    if(!ids.length) return;
    html+=`<div class="cat"><h3><span class="ci">${CATS[cat].i}</span><span>${CATS[cat].n}</span>
      <span class="cn">${ids.length} Artikel</span></h3><div class="list">`;
    ids.forEach(id=>{
      const done=!!state.checks[id];
      const pack=fmtPack(id,agg[id]);
      html+=`<div class="item ${done?'done':''}" data-id="${id}">
        <div class="cbox"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div>
        <div class="iname">${ING[id].n}</div>
        <div class="iamt">${fmtAmount(id,agg[id])}${pack?`<span class="ipack">${pack}</span>`:""}</div>
      </div>`;
    });
    html+=`</div></div>`;
  });
  cont.innerHTML=html;
  cont.querySelectorAll(".item").forEach(it=>{
    it.onclick=()=>{
      const id=it.dataset.id;
      if(state.checks[id]) delete state.checks[id]; else state.checks[id]=1;
      save(); renderShop(); updateBadge();
    };
  });
}
function updateBadge(){
  const agg=aggregate();
  const open=Object.keys(agg).filter(id=>!state.checks[id]).length;
  const b=document.getElementById("shopBadge");
  if(open>0){b.style.display="";b.textContent=open;} else b.style.display="none";
}

/* ---------- Navigation ---------- */
document.querySelectorAll(".tab").forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));
    t.classList.add("on");
    const v=t.dataset.view;
    document.getElementById("viewPlan").classList.toggle("on",v==="Plan");
    document.getElementById("viewShop").classList.toggle("on",v==="Shop");
    document.getElementById("regenBtn").style.visibility = v==="Plan" ? "visible":"hidden";
    window.scrollTo({top:0,behavior:"smooth"});
  };
});
document.getElementById("regenBtn").onclick=()=>{
  state.week=genWeek(); state.checks={};
  save(); renderPlan(); renderMeta(); renderShop(); updateBadge();
  window.scrollTo({top:0,behavior:"smooth"});
};
document.getElementById("toggleAll").onclick=()=>{
  state.days = state.days.length===7 ? [] : [0,1,2,3,4,5,6];
  save(); renderChips(); renderShop(); updateBadge();
};

/* ---------- Init ---------- */
renderPlan(); renderMeta(); renderChips(); renderShop(); updateBadge();

/* ---------- Service Worker (für Offline-Installation) ---------- */
if("serviceWorker" in navigator){
  const sw=`self.addEventListener("install",e=>self.skipWaiting());
  self.addEventListener("activate",e=>e.waitUntil(self.clients.claim()));
  self.addEventListener("fetch",e=>{
    e.respondWith(caches.open("mahlzeit").then(c=>
      c.match(e.request).then(r=> r || fetch(e.request).then(res=>{
        if(e.request.method==="GET") c.put(e.request,res.clone()); return res;
      }).catch(()=>caches.match("./")) )));
  });`;
  try{
    const url=URL.createObjectURL(new Blob([sw],{type:"text/javascript"}));
    navigator.serviceWorker.register(url).catch(()=>{});
  }catch(e){}
}
</script>
</body>
